name: CI

# Runs the full quality gate on every push and pull request. The gate is the
# same `make check` developers run locally — format, vet, lint, staticcheck,
# cognitive complexity, vulnerability scan, and the race-enabled integration
# tests.
on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
          cache: true

      - name: Quality gate
        run: make check
